<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RNX | TOTAL EMPIRE CONTROL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Inter:wght@900&display=swap');

        @keyframes pink-glow {
            0%, 100% { box-shadow: 0 0 10px #FF1493; border-color: #FF1493; }
            50% { box-shadow: 0 0 25px #FF1493, 0 0 15px #FF69B4; border-color: #ffffff; }
        }
        .neon-pulse-pink { animation: pink-glow 1.5s infinite; }
        
        .ransom-note {
            font-family: 'Special Elite', cursive;
            background: white; color: black;
            padding: 4px 10px; transform: rotate(-1.5deg);
            display: inline-block; font-weight: 900;
            text-transform: uppercase;
        }

        .bg-grid {
            background-color: #1a1a1a;
            background-image: linear-gradient(#2d2d2d 1px, transparent 1px), 
                              linear-gradient(90deg, #2d2d2d 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .sidebar-btn { 
            transition: all 0.2s ease; 
            border: 3px solid #333; 
            margin-bottom: 0.6rem; 
            width: 100%; 
            height: 4.2rem; 
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; 
            background: #000; flex-shrink: 0; border-radius: 6px;
        }
        .sidebar-btn:hover { transform: scale(1.02); border-color: #FF1493; background: #080808; }
        
        .btn-label {
            font-family: 'Inter', sans-serif;
            font-size: 9px; font-weight: 900;
            margin-top: 4px; color: #ffffff;
            text-transform: uppercase; text-align: center;
        }

        .section-header {
            font-size: 10px; font-weight: 900; color: #FF1493;
            text-transform: uppercase; margin: 1.2rem 0 0.4rem 0.5rem;
            letter-spacing: 0.1em; border-left: 3px solid #FF1493; padding-left: 8px;
        }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #FF1493; }

        iframe { width: 100%; height: 100%; border: none; background: white; }
    </style>
</head>
<body class="text-white flex h-screen overflow-hidden bg-grid font-mono">

    <nav class="w-64 bg-black border-r-4 border-[#FF1493] flex flex-col h-full z-50 shadow-2xl">
        
        <div class="py-6 flex-shrink-0 text-center border-b border-zinc-900">
            <span class="ransom-note text-lg">RNX ARMS</span>
        </div>

        <div class="flex-1 overflow-y-auto px-4 py-2 custom-scroll">
            
            <div class="section-header">PRIMARY ENGINE</div>
            <button onclick="window.open('https://rachaelnike-queen.github.io/Funkyblackpoppy-reselling-app/', '_blank')" class="sidebar-btn border-4 border-[#FF1493] neon-pulse-pink">
                <span class="text-xl">🛍️</span>
                <span class="btn-label font-bold text-[#FF1493]">FBP RESELL APP</span>
            </button>

            <div class="section-header">Magik Tools</div>
            <button onclick="window.open('https://funkyblackpoppy-art.github.io/turtle-oracle/', '_blank')" class="sidebar-btn border-l-4 border-green-500">
                <span class="text-xl">🐾</span>
                <span class="btn-label">Turtle Paws</span>
            </button>

            <button onclick="window.open('https://funkyblackpoppy-art.github.io/turtle-oracle/', '_blank')" class="sidebar-btn border-l-4 border-purple-500">
                <span class="text-xl">✨</span>
                <span class="btn-label">Kindred Soul</span>
            </button>

            <div class="section-header">Core Logic</div>
            <button onclick="loadPod('MASTER BIBLE', '0')" class="sidebar-btn">
                <span class="text-xl">📖</span>
                <span class="btn-label">Master Bible</span>
            </button>

            <button onclick="loadExternal('https://www.canva.com', 'CANVA STUDIO')" class="sidebar-btn border-l-4 border-[#00d2ff]">
                <span class="text-xl">🎨</span>
                <span class="btn-label">Canva Studio</span>
            </button>

            <div class="section-header">Empire Hub</div>
            <button onclick="loadExternal('https://funkyblackpoppy-art.github.io/blackpoppymagik/', 'FBP MAGIK')" class="sidebar-btn">
                <span class="text-xl">🪄</span>
                <span class="btn-label">FBP Magik</span>
            </button>

            <button onclick="loadExternal('https://funkyblackpoppy-art.github.io/curseyqueen-hq/', 'CURSEY QUEEN')" class="sidebar-btn">
                <span class="text-xl">👑</span>
                <span class="btn-label">Cursey Queen</span>
            </button>

            <button onclick="loadExternal('https://funkyblackpoppy-art.github.io/sacred-chaos-mission-control/', 'SACRED CHAOS')" class="sidebar-btn">
                <span class="text-xl">🌀</span>
                <span class="btn-label">Sacred Chaos</span>
            </button>

            <button onclick="loadExternal('https://blackpoppymagik-rgb.github.io/book-of-shadows/', 'SHADOWS')" class="sidebar-btn">
                <span class="text-xl">📓</span>
                <span class="btn-label">Book of Shadows</span>
            </button>

            <div class="section-header">Operations & Legacy</div>
            <button onclick="window.open('https://blackpoppymagik-rgb.github.io/FBP-Command-Center2/', '_blank')" class="sidebar-btn border-l-4 border-zinc-600">
                <span class="text-xl">🏛️</span>
                <span class="btn-label">FBP Legacy</span>
            </button>

            <button onclick="loadPod('PROMPT BANK', 'PASTE_PROMPT_GID')" class="sidebar-btn">
                <span class="text-xl">🧠</span>
                <span class="btn-label">Prompt Bank</span>
            </button>

        </div>

        <div class="p-4 border-t border-zinc-800 bg-black flex flex-col items-center flex-shrink-0">
            <button onclick="loadPod('AI HUB', 'PASTE_TOOLBOX_GID')" class="group">
                <div class="w-12 h-12 bg-[#FF1493] text-black flex items-center justify-center font-black border-2 border-white transform rotate-2 shadow-2xl text-xl mb-1 transition-all group-hover:rotate-0 group-hover:scale-110 neon-pulse-pink">
                    AI
                </div>
            </button>
            <span class="text-[8px] font-black text-[#FF1493] uppercase">Architect Hub</span>
        </div>
    </nav>

    <main class="flex-1 flex flex-col min-w-0">
        <header class="h-12 bg-black border-b-2 border-[#FF1493] flex items-center px-6 justify-between flex-shrink-0">
            <span id="unit-title" class="ransom-note text-[10px]">UNIT: STANDBY</span>
            <div class="text-[9px] font-black text-[#FF1493] italic uppercase tracking-widest">RNX Empire Sync</div>
        </header>

        <div class="flex-1 relative">
            <iframe id="main-viewport" src="about:blank"></iframe>
            <div id="overlay" class="absolute inset-0 bg-[#1a1a1a] flex flex-col items-center justify-center text-center z-10">
                <h1 class="text-5xl font-black italic text-white tracking-tighter mb-2">
                    RAYNE <span class="text-[#FF1493]">NIKE</span> X
                </h1>
                <div class="bg-white text-black px-8 py-2 font-black text-xl uppercase">All Systems Live</div>
            </div>
        </div>
    </main>

    <script>
        const SHEET_BASE = "https://docs.google.com/spreadsheets/d/1VDE2UK1lFXKsfgx1fI8z8nqesBzAIpWZHO4g4vCWE-k/edit?rm=minimal#gid=";

        function loadPod(name, gid) {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('unit-title').innerText = "UNIT: " + name;
            document.getElementById('main-viewport').src = SHEET_BASE + gid;
        }

        function loadExternal(url, name) {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('unit-title').innerText = "UNIT: " + name;
            document.getElementById('main-viewport').src = url;
        }
    </script>
</body>
</html>
