<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RNX | EMPIRE COMMAND</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Inter:wght@900&display=swap');

        /* Jamie Reid Pink Glow */
        @keyframes pink-glow {
            0%, 100% { box-shadow: 0 0 10px #FF1493; border-color: #FF1493; }
            50% { box-shadow: 0 0 25px #FF1493, 0 0 15px #FF69B4; border-color: #ffffff; }
        }
        .neon-pulse-pink { animation: pink-glow 1.5s infinite; }
        
        .ransom-note {
            font-family: 'Special Elite', cursive;
            background: white;
            color: black;
            padding: 4px 10px;
            transform: rotate(-2deg);
            display: inline-block;
            font-weight: 900;
            text-transform: uppercase;
        }

        .bg-grid {
            background-color: #2d2d2d;
            background-image: linear-gradient(to right, #3d3d3d 1px, transparent 1px),
                              linear-gradient(to bottom, #3d3d3d 1px, transparent 1px);
            background-size: 50px 50px;
        }

        /* LARGER SIDE BUTTONS */
        .sidebar-btn { 
            transition: all 0.2s ease; 
            border: 3px solid #444; 
            margin-bottom: 1.5rem; 
            width: 7rem; /* Increased width */
            height: 6rem; /* Increased height */
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            background: #111;
            flex-shrink: 0;
            border-radius: 4px;
        }
        .sidebar-btn:hover { transform: scale(1.05); border-color: #FF1493; background: #000; }
        
        /* HIGH VISIBILITY LABELS */
        .btn-label {
            font-family: 'Inter', sans-serif;
            font-size: 10px;
            font-weight: 900;
            margin-top: 8px;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            text-align: center;
            line-height: 1;
        }

        iframe { width: 100%; height: 100%; border: none; background: white; }

        .sidebar-scroll::-webkit-scrollbar { width: 6px; }
        .sidebar-scroll::-webkit-scrollbar-thumb { background: #FF1493; }
        .sidebar-scroll { scrollbar-width: thin; scrollbar-color: #FF1493 #1a1a1a; }
    </style>
</head>
<body class="text-white flex h-screen overflow-hidden bg-grid">

    <!-- SIDEBAR: HIGH-VISIBILITY HANGAR -->
    <nav class="w-48 bg-[#111] border-r-8 border-[#FF1493] flex flex-col items-center py-8 z-50 shadow-2xl">
        <div class="mb-8 flex-shrink-0 text-center">
            <span class="ransom-note text-lg">RNX</span>
        </div>

        <div class="flex-1 overflow-y-auto sidebar-scroll w-full flex flex-col items-center px-4">
            
            <!-- MASTER BIBLE -->
            <button onclick="loadSpace('https://docs.google.com/spreadsheets/d/1VDE2UK1lFXKsfgx1fI8z8nqesBzAIpWZHO4g4vCWE-k/preview', 'THE BIBLE')" class="sidebar-btn neon-pulse-pink">
                <span class="text-3xl">📖</span>
                <span class="btn-label">Master Bible</span>
            </button>

            <!-- RACHAELNIKE -->
            <button onclick="loadSpace('https://rachaelnike.com', 'RACHAELNIKE')" class="sidebar-btn">
                <span class="text-3xl text-[#FF1493]">👑</span>
                <span class="btn-label">RachaelNike</span>
            </button>

            <!-- FUNKYBLACKPOPPY -->
            <button onclick="loadSpace('https://www.depop.com/funkyblackpoppy', 'FUNKYBLACKPOPPY')" class="sidebar-btn">
                <span class="text-3xl">🛍️</span>
                <span class="btn-label">FunkyPoppy</span>
            </button>

            <!-- BLACKPOPPYMAGIK -->
            <button onclick="loadSpace('https://blackpoppymagik.com', 'BLACKPOPPYMAGIK')" class="sidebar-btn">
                <span class="text-3xl">🔮</span>
                <span class="btn-label">BP Magik</span>
            </button>

            <!-- GHOSTQUE -->
            <button onclick="loadSpace('https://ghostque.com', 'GHOSTQUE')" class="sidebar-btn">
                <span class="text-3xl">👻</span>
                <span class="btn-label">Ghostque</span>
            </button>

            <!-- VENDOO -->
            <button onclick="loadSpace('https://app.vendoo.co', 'VENDOO')" class="sidebar-btn">
                <span class="text-3xl">💰</span>
                <span class="btn-label">Vendoo</span>
            </button>

            <!-- CURSEYQUEEN -->
            <button onclick="loadSpace('https://studio.youtube.com/', 'CURSEYQUEEN')" class="sidebar-btn">
                <span class="text-3xl">📺</span>
                <span class="btn-label">CurseyQueen</span>
            </button>

            <!-- BLACKPOPPYCONTINUUM -->
            <button onclick="loadSpace('https://blackpoppycontinuum.substack.com/', 'CONTINUUM')" class="sidebar-btn">
                <span class="text-3xl">🌀</span>
                <span class="btn-label">Continuum</span>
            </button>

            <!-- TURTLE ORACLE -->
            <button onclick="loadSpace('https://docs.google.com/spreadsheets/d/1VDE2UK1lFXKsfgx1fI8z8nqesBzAIpWZHO4g4vCWE-k/edit#gid=0', 'TURTLE ORACLE')" class="sidebar-btn border-dashed">
                <span class="text-3xl">🐢</span>
                <span class="btn-label">Oracle</span>
            </button>

        </div>

        <div class="mt-6 flex-shrink-0 text-center">
            <button class="w-14 h-14 bg-[#FF1493] text-black font-black border-4 border-white transform rotate-3 shadow-2xl text-xl">AI</button>
            <div class="btn-label mt-2">ASSISTANT</div>
        </div>
    </nav>

    <!-- MAIN ENGINE -->
    <main class="flex-1 flex flex-col">
        <header class="h-16 bg-[#111] border-b-4 border-[#FF1493] flex items-center px-8 justify-between">
            <div class="flex items-center space-x-4">
                <div class="h-5 w-5 bg-[#FF1493] animate-ping"></div>
                <span id="space-title" class="ransom-note text-sm uppercase">System Status: Active</span>
            </div>
            <div class="text-xs font-black text-[#FF1493] italic uppercase tracking-widest">RNX Command / Riot Mode</div>
        </header>

        <div class="flex-1 relative bg-[#2d2d2d]">
            <iframe id="viewport" src="about:blank"></iframe>
            <div id="overlay" class="absolute inset-0 bg-[#2d2d2d] flex flex-col items-center justify-center">
                <h1 class="text-8xl font-black italic text-white tracking-tighter mb-4 transform -rotate-1 drop-shadow-2xl">
                    RAYNE <span class="text-[#FF1493]">NIKE</span> X
                </h1>
                <div class="bg-white text-black px-10 py-3 font-black transform rotate-1 text-2xl shadow-2xl">EMPIRE COMMAND</div>
            </div>
        </div>
    </main>

    <script>
        function loadSpace(url, title) {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('viewport').src = url;
            document.getElementById('space-title').innerText = "UNIT: " + title;
        }
    </script>
</body>
</html>
